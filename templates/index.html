<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Géoportail × QGIS</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='IGN_logo_2012.svg.png') }}" />
  <style>
    /* ── Thème clair (par défaut) ─────────────────────────────────────────── */
    :root {
      --accent: #1565c0;
      --accent-dark: #0d47a1;
      --text: #1b2430;
      --muted: #5b6675;
      --border: #e2e6ec;
      --bubble-user: #1565c0;
      --bubble-bot: #ffffff;
      --surface: rgba(255, 255, 255, 0.85);
      --steps-bg: #fafbfc;
      --code-bg: #eef1f5;
      --input-bg: #ffffff;
      --hover: rgba(0, 0, 0, .06);
      --shadow: 0 1px 2px rgba(0, 0, 0, .08);
      --bg-overlay: linear-gradient(rgba(245, 247, 250, 0.50), rgba(245, 247, 250, 0.50));
      --bg-image: url("{{ url_for('static', filename='mode_clair.jpg') }}");
      --logo: url("{{ url_for('static', filename='IGN_logo_2012.svg.png') }}");
      --input-h: 96px;
      --side-w: 264px;
      --content-max: 1080px;
    }
    /* ── Thème sombre ─────────────────────────────────────────────────────── */
    :root[data-theme="dark"] {
      --accent: #4aa3ef;
      --accent-dark: #2a87d8;
      --text: #e6eaf0;
      --muted: #9aa6b4;
      --border: #33404f;
      --bubble-user: #1f6fbf;
      --bubble-bot: #1d2733;
      --surface: rgba(18, 24, 32, 0.80);
      --steps-bg: rgba(255, 255, 255, 0.04);
      --code-bg: #2a3645;
      --input-bg: #161e29;
      --hover: rgba(255, 255, 255, .08);
      --shadow: 0 1px 3px rgba(0, 0, 0, .35);
      --bg-overlay: linear-gradient(rgba(8, 12, 18, 0.55), rgba(8, 12, 18, 0.55));
      --bg-image: url("{{ url_for('static', filename='mode_sombre.jpg') }}");
      /* logo transparent unique : pas de variante sombre nécessaire */
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg-overlay), var(--bg-image) center / cover fixed no-repeat;
    }

    /* ── Panneau latéral ──────────────────────────────────────────────────── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--side-w); z-index: 20;
      background: var(--surface);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 12px; gap: 10px;
      transition: transform .25s ease;
    }
    /* Bouton d'ouverture du panneau (visible seulement sur petits écrans) */
    #side-toggle { display: none; }
    .overlay { display: none; }
    .sidebar h2 {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); margin: 4px 4px;
    }
    #new-conv {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 10px; font-weight: 600; cursor: pointer; font-size: .9rem;
    }
    #new-conv:hover { background: var(--accent-dark); }
    .conv-list { overflow-y: auto; max-height: 46vh; display: flex; flex-direction: column; gap: 4px; }
    .conv {
      display: flex; align-items: center; gap: 6px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; border: 1px solid transparent;
    }
    .conv:hover { background: var(--hover); }
    .conv.active { border-color: var(--accent); background: var(--hover); }
    .conv .meta { flex: 1; min-width: 0; }
    .conv .title { font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv .date { font-size: .7rem; color: var(--muted); }
    .conv .del { opacity: .5; background: none; border: none; cursor: pointer; font-size: .85rem; color: var(--muted); }
    .conv .del:hover { opacity: 1; color: #d32f2f; }
    .files { border-top: 1px solid var(--border); padding-top: 8px; overflow-y: auto; flex: 1 1 auto; }
    .file-list { display: flex; flex-direction: column; gap: 3px; }
    .file-list a {
      display: flex; justify-content: space-between; gap: 8px; align-items: baseline;
      font-size: .8rem; color: var(--accent); text-decoration: none; padding: 4px 6px; border-radius: 6px;
    }
    .file-list a:hover { background: var(--hover); }
    .file-list .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-list .sz { color: var(--muted); font-size: .72rem; flex: none; }
    .file-empty { color: var(--muted); font-size: .8rem; padding: 4px 6px; }

    /* ── Zone principale (décalée du panneau) ─────────────────────────────── */
    .content { margin-left: var(--side-w); }
    header {
      position: sticky; top: 0; z-index: 5;
      background: var(--surface);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 10px 22px; display: flex; align-items: center; gap: 14px;
    }
    header .logo {
      width: 48px; height: 52px; flex: none;
      background: var(--logo) center / contain no-repeat;
    }
    header .brand { display: flex; flex-direction: column; line-height: 1.1; }
    header .brand h1 { font-size: 1.02rem; margin: 0; font-weight: 700; letter-spacing: .2px; }
    header .brand .tagline { font-size: .74rem; color: var(--muted); }
    header .sub { color: var(--muted); font-size: .78rem; margin-left: auto; }
    header button {
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      border-radius: 9px; padding: 7px 11px; cursor: pointer; font-size: 1rem;
      transition: border-color .15s, color .15s, background .15s;
    }
    header button:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Switches (verbosité + thème) ─────────────────────────────────────── */
    .switches { display: flex; flex-direction: column; gap: 6px; }

    /* ── Sélecteur de modèle ─────────────────────────────────────────── */
    .model-select {
      font-size: .78rem; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--input-bg); color: var(--text);
      outline: none; cursor: pointer; max-width: 180px;
      transition: border-color .15s;
    }
    .model-select:focus { border-color: var(--accent); }
    .model-select:disabled { opacity: .5; cursor: default; }
    .switch-row {
      display: flex; align-items: center; gap: 8px; font-size: .78rem; color: var(--muted);
      white-space: nowrap; user-select: none;
    }
    .switch-row .switch-label { min-width: 52px; text-align: right; }
    .switch-track {
      position: relative; width: 36px; height: 20px; flex: none;
      background: var(--border); border-radius: 10px; cursor: pointer;
      transition: background .2s;
    }
    .switch-track.on { background: var(--accent); }
    .switch-track .switch-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2);
      transition: transform .2s;
    }
    .switch-track.on .switch-thumb { transform: translateX(16px); }
    .switch-row .switch-icon { font-size: .9rem; line-height: 1; }

    /* ── Badge coût par requête ─────────────────────────────────────────── */
    .cost-badge {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 4px; padding: 2px 8px;
      font-size: .65rem; color: var(--muted); opacity: .55;
      transition: opacity .2s;
    }
    .cost-badge:hover { opacity: 1; }
    .cost-badge .cost-val { font-weight: 600; }

    main {
      max-width: var(--content-max); margin: 0 auto;
      padding: 20px 24px calc(var(--input-h) + 24px);
    }

    .msg { display: flex; margin: 14px 0; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 88%; padding: 11px 14px; border-radius: 14px;
      line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
      box-shadow: var(--shadow);
    }
    .msg.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    /* ── Contenu markdown rendu ───────────────────────────────────────────── */
    .bubble.md { white-space: normal; }
    .bubble.md > :first-child { margin-top: 0; }
    .bubble.md > :last-child { margin-bottom: 0; }
    .bubble.md p { margin: .5em 0; }
    .bubble.md h1, .bubble.md h2, .bubble.md h3, .bubble.md h4 { margin: .7em 0 .35em; line-height: 1.25; }
    .bubble.md h1 { font-size: 1.3em; }
    .bubble.md h2 { font-size: 1.18em; }
    .bubble.md h3 { font-size: 1.06em; }
    .bubble.md h4 { font-size: 1em; }
    .bubble.md ul, .bubble.md ol { margin: .4em 0; padding-left: 1.4em; }
    .bubble.md li { margin: .15em 0; }
    .bubble.md a { color: var(--accent); text-decoration: underline; }
    .bubble.md code {
      background: var(--code-bg); padding: 1px 5px; border-radius: 5px;
      font-size: .88em; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .bubble.md pre {
      background: var(--code-bg); padding: 10px 12px; border-radius: 10px;
      overflow-x: auto; margin: .5em 0;
    }
    .bubble.md pre code { background: none; padding: 0; font-size: .85em; }
    .bubble.md blockquote {
      margin: .5em 0; padding: .2em .9em; border-left: 3px solid var(--border); color: var(--muted);
    }
    .bubble.md hr { border: none; border-top: 1px solid var(--border); margin: .8em 0; }
    .bubble table { border-collapse: collapse; margin: .5em 0; font-size: .95em; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
    .bubble th { background: var(--steps-bg); }

    .steps {
      margin: 6px 0 0; border: 1px dashed var(--border); border-radius: 10px;
      background: var(--steps-bg); font-size: .82rem; overflow: hidden;
    }
    .steps summary {
      cursor: pointer; padding: 8px 12px; color: var(--muted);
      user-select: none; list-style: none;
    }
    .steps summary::-webkit-details-marker { display: none; }
    .steps .step { padding: 4px 12px; border-top: 1px solid var(--border); }
    .step .tool { color: var(--accent-dark); font-weight: 600; }
    .step code { background: var(--code-bg); padding: 1px 5px; border-radius: 5px; font-size: .8rem; }
    .step .res { color: var(--muted); white-space: pre-wrap; }

    .typing { color: var(--muted); font-style: italic; }

    /* ── Indicateur de travail : spinner « planète » + verbe rotatif ────── */
    .working { display: inline-flex; align-items: center; gap: 9px; color: var(--muted); font-style: italic; }
    .planet { position: relative; width: 20px; height: 20px; flex: none; }
    .planet .core { position: absolute; inset: 5px; border-radius: 50%; background: #4caf50; }
    .planet .orbit { position: absolute; inset: 0; animation: planet-spin 1.4s linear infinite; }
    .planet .orbit::before {
      content: ""; position: absolute; top: -1px; left: 50%;
      width: 6px; height: 6px; border-radius: 50%; background: #2e7d32;
      transform: translateX(-50%);
    }
    @keyframes planet-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .planet .orbit { animation-duration: 4s; } }

    /* Mode concis : on masque les étapes (appels/résultats d'outils) */
    :root[data-verbose="0"] .steps { display: none; }

    .composer {
      position: fixed; left: var(--side-w); right: 0; bottom: 0; z-index: 5;
      background: var(--surface);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border-top: 1px solid var(--border);
    }
    .composer .inner {
      max-width: var(--content-max); margin: 0 auto; padding: 14px 24px;
      display: flex; gap: 10px; align-items: flex-end;
    }
    textarea#prompt {
      flex: 1; resize: none; min-height: 44px; max-height: 160px;
      padding: 11px 13px; border: 1px solid var(--border); border-radius: 12px;
      font: inherit; outline: none; background: var(--input-bg); color: var(--text);
    }
    textarea#prompt::placeholder { color: var(--muted); }
    textarea#prompt:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,163,239,.20); }
    button#send {
      background: var(--accent); color: #fff; border: none; border-radius: 12px;
      padding: 0 20px; height: 44px; font-weight: 600; cursor: pointer;
    }
    button#send:hover { background: var(--accent-dark); }
    button#send:disabled { background: #9db8d8; cursor: default; }
    /* Mode « arrêt » pendant que l'agent travaille : carré rouge */
    button#send.stop { background: #d32f2f; width: 44px; padding: 0; font-size: 1.1rem; line-height: 1; }
    button#send.stop:hover { background: #b71c1c; }

    /* ── Transitions douces ───────────────────────────────────────────────── */
    .conv, .file-list a, #new-conv, button#send { transition: background .15s, border-color .15s, color .15s; }
    .bubble { transition: box-shadow .15s; }

    /* ── Barres de défilement discrètes ───────────────────────────────────── */
    .conv-list, .files, main { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .conv-list::-webkit-scrollbar, .files::-webkit-scrollbar { width: 8px; }
    .conv-list::-webkit-scrollbar-thumb, .files::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 8px;
    }

    /* ── Écran d'accueil (conversation vide) ──────────────────────────────── */
    .welcome {
      text-align: center; margin: 7vh auto 0; max-width: 520px; padding: 30px 26px 34px;
      background: var(--surface);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .20);
    }
    .welcome .welcome-logo {
      width: 150px; height: 165px; margin: 0 auto;
      background: var(--logo) center / contain no-repeat;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .25));
    }
    .welcome h2 { margin: 16px 0 4px; font-size: 1.4rem; }
    .welcome p { color: var(--muted); margin: 0 0 22px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .chip {
      background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 999px; padding: 9px 14px; font-size: .85rem; cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    /* ── Responsive ───────────────────────────────────────────────────────── */
    /* Écrans intermédiaires : panneau un peu plus étroit */
    @media (max-width: 1100px) { :root { --side-w: 230px; } }

    /* Petits écrans : panneau latéral coulissant (off-canvas) + bouton ☰ */
    @media (max-width: 820px) {
      .content { margin-left: 0; }
      .composer { left: 0; }
      main { padding-left: 14px; padding-right: 14px; }
      .bubble { max-width: 94%; }
      .sidebar { transform: translateX(-100%); box-shadow: 0 0 40px rgba(0, 0, 0, .35); }
      .sidebar.open { transform: translateX(0); }
      #side-toggle {
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 1.2rem; line-height: 1; padding: 6px 10px;
      }
      .overlay.show {
        display: block; position: fixed; inset: 0; z-index: 15;
        background: rgba(0, 0, 0, .35);
      }
    }
  </style>
  <script>
    // Applique le thème + le mode verbeux avant le rendu (évite tout flash).
    (function () {
      var t = localStorage.getItem("theme")
        || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
      document.documentElement.dataset.verbose = localStorage.getItem("verbose") || "1";
    })();
  </script>
</head>
<body>
  <aside class="sidebar">
    <button id="new-conv">＋ Nouvelle conversation</button>
    <h2>Conversations</h2>
    <div id="conv-list" class="conv-list"></div>
    <h2>Fichiers de la conversation</h2>
    <div class="files"><div id="file-list" class="file-list"></div></div>
  </aside>
  <div id="overlay" class="overlay"></div>

  <div class="content">
    <header>
      <button id="side-toggle" title="Conversations">☰</button>
      <span class="logo" role="img" aria-label="IGN"></span>
      <div class="brand">
        <h1>Agent géospatial</h1>
        <span class="tagline">Géoportail IGN × QGIS</span>
      </div>
      <span class="sub">QGIS ouvert + plugin « Start Server » requis</span>
      <select id="model-select" class="model-select" title="Modèle LLM">
        <option>Chargement…</option>
      </select>
      <div class="switches">
        <div class="switch-row">
          <span class="switch-label">Détails</span>
          <div id="verbose" class="switch-track" role="switch" tabindex="0" title="Afficher / masquer les étapes de l'agent">
            <span class="switch-thumb"></span>
          </div>
          <span class="switch-icon" id="verbose-icon">👁</span>
        </div>
        <div class="switch-row">
          <span class="switch-label">Sombre</span>
          <div id="theme" class="switch-track" role="switch" tabindex="0" title="Thème clair / sombre">
            <span class="switch-thumb"></span>
          </div>
          <span class="switch-icon" id="theme-icon">🌙</span>
        </div>
      </div>
    </header>

    <main id="messages"></main>

    <div class="composer">
      <div class="inner">
        <textarea id="prompt" rows="1"
          placeholder="Ex. : géocode '1 place Bellecour, Lyon' et charge le cadastre dans QGIS"></textarea>
        <button id="send">Envoyer</button>
      </div>
    </div>
  </div>

  <script>
    const $messages = document.getElementById("messages");
    const $prompt = document.getElementById("prompt");
    const $send = document.getElementById("send");
    const $theme = document.getElementById("theme");
    const $verbose = document.getElementById("verbose");
    const $newConv = document.getElementById("new-conv");
    const $convList = document.getElementById("conv-list");
    const $fileList = document.getElementById("file-list");
    const $sidebar = document.querySelector(".sidebar");
    const $sideToggle = document.getElementById("side-toggle");
    const $overlay = document.getElementById("overlay");
    const $modelSelect = document.getElementById("model-select");

    let activeId = null;

    // ── Panneau latéral coulissant (petits écrans) ──────────────────────────
    function openSidebar() { $sidebar.classList.add("open"); $overlay.classList.add("show"); }
    function closeSidebar() { $sidebar.classList.remove("open"); $overlay.classList.remove("show"); }
    $sideToggle.addEventListener("click", openSidebar);
    $overlay.addEventListener("click", closeSidebar);

    // ── Sélecteur de modèle ─────────────────────────────────────────────────
    async function loadModels() {
      try {
        const models = await (await fetch("/models")).json();
        $modelSelect.innerHTML = "";
        for (const m of models) {
          const opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.label;
          if (m.active) opt.selected = true;
          $modelSelect.appendChild(opt);
        }
      } catch (e) {
        $modelSelect.innerHTML = '<option>Erreur</option>';
      }
    }
    $modelSelect.addEventListener("change", async () => {
      const id = $modelSelect.value;
      $modelSelect.disabled = true;
      try {
        const resp = await fetch("/model", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: id }),
        });
        if (!resp.ok) {
          const err = await resp.json();
          alert("Erreur changement de modèle : " + (err.error || resp.status));
          await loadModels();  // remet la sélection précédente
        }
      } catch (e) {
        alert("Erreur réseau : " + e);
        await loadModels();
      } finally {
        $modelSelect.disabled = false;
      }
    });
    loadModels();

    // ── Thème clair / sombre ────────────────────────────────────────────────
    const $themeIcon = document.getElementById("theme-icon");
    function applyTheme(t) {
      document.documentElement.setAttribute("data-theme", t);
      const isDark = t === "dark";
      $theme.classList.toggle("on", isDark);
      $theme.setAttribute("aria-checked", isDark);
      $themeIcon.textContent = isDark ? "☀️" : "🌙";
    }
    applyTheme(document.documentElement.getAttribute("data-theme") || "light");
    $theme.addEventListener("click", () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      localStorage.setItem("theme", next);
      applyTheme(next);
    });
    $theme.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); $theme.click(); } });

    // ── Mode verbeux / concis ───────────────────────────────────────────────
    const $verboseIcon = document.getElementById("verbose-icon");
    function applyVerbose(v) {
      document.documentElement.dataset.verbose = v;
      const on = v === "1";
      $verbose.classList.toggle("on", on);
      $verbose.setAttribute("aria-checked", on);
      $verboseIcon.textContent = on ? "👁" : "🙈";
    }
    applyVerbose(document.documentElement.dataset.verbose || "1");
    $verbose.addEventListener("click", () => {
      const next = document.documentElement.dataset.verbose === "1" ? "0" : "1";
      localStorage.setItem("verbose", next);
      applyVerbose(next);
    });
    $verbose.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); $verbose.click(); } });

    // Verbes rigolos affichés pendant que l'agent travaille (clin d'œil au
    // spinner-verbs-dictionary). Liste librement éditable.
    const VERBS = [
      "Combobulation…", "Triangulation…", "Géo-cogitation…", "Cartographie…",
      "Moulinage…", "Percolation…", "Réticulation…", "Pérégrination…",
      "Tergiversation…", "Frobnication…", "Cogitation…", "Élucubration…",
      "Topographie…", "Géoschmilblickage…", "Cadastration…", "Vectorisation…",
    ];
    const pickVerb = () => VERBS[Math.floor(Math.random() * VERBS.length)];

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    // ── Mini-rendu Markdown (sûr : on échappe le HTML AVANT de formater) ─────
    function mdInline(s) {
      const codes = [];
      s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return "\u0001" + (codes.length - 1) + "\u0001"; });
      s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, txt, url) => {
        const plain = url.replace(/&amp;/g, "&");
        if (!/^(https?:|mailto:|\/|#)/i.test(plain)) return m;  // refuse javascript:, etc.
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${txt}</a>`;
      });
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
      s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
      s = s.replace(/\u0001(\d+)\u0001/g, (m, i) => "<code>" + codes[i] + "</code>");
      return s;
    }
    function mdRow(s) {
      return s.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
    }
    function renderMarkdown(src) {
      src = (src || "").replace(/\r\n?/g, "\n");
      const blocks = [];
      src = src.replace(/```[^\n]*\n([\s\S]*?)```/g, (m, code) => {
        blocks.push("<pre><code>" + escapeHtml(code.replace(/\n+$/, "")) + "</code></pre>");
        return "\u0002" + (blocks.length - 1) + "\u0002";
      });
      src = escapeHtml(src);
      const lines = src.split("\n");
      let html = "", i = 0, para = [];
      const flush = () => { if (para.length) { html += "<p>" + mdInline(para.join(" ")) + "</p>"; para = []; } };
      while (i < lines.length) {
        const line = lines[i], t = line.trim();
        if (/^\u0002\d+\u0002$/.test(t)) { flush(); html += t; i++; continue; }
        if (t === "") { flush(); i++; continue; }
        let m = /^(#{1,6})\s+(.*)$/.exec(t);
        if (m) { flush(); const l = m[1].length; html += `<h${l}>${mdInline(m[2])}</h${l}>`; i++; continue; }
        if (/^(-{3,}|\*{3,}|_{3,})$/.test(t)) { flush(); html += "<hr>"; i++; continue; }
        if (t.includes("|") && i + 1 < lines.length &&
            /-/.test(lines[i + 1]) && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1])) {
          flush();
          const header = mdRow(t); i += 2;
          const rows = [];
          while (i < lines.length && lines[i].includes("|") && lines[i].trim() !== "") { rows.push(mdRow(lines[i].trim())); i++; }
          html += "<table><thead><tr>" + header.map(c => `<th>${mdInline(c)}</th>`).join("") + "</tr></thead><tbody>" +
            rows.map(r => "<tr>" + r.map(c => `<td>${mdInline(c)}</td>`).join("") + "</tr>").join("") + "</tbody></table>";
          continue;
        }
        if (/^&gt;\s?/.test(t)) {
          flush(); const q = [];
          while (i < lines.length && /^&gt;\s?/.test(lines[i].trim())) { q.push(lines[i].trim().replace(/^&gt;\s?/, "")); i++; }
          html += "<blockquote>" + q.map(mdInline).join("<br>") + "</blockquote>";
          continue;
        }
        if (/^[-*+]\s+/.test(t) || /^\d+\.\s+/.test(t)) {
          flush();
          const ordered = /^\d+\.\s+/.test(t), tag = ordered ? "ol" : "ul", items = [];
          while (i < lines.length) {
            const lt = lines[i].trim();
            const mm = ordered ? /^\d+\.\s+(.*)$/.exec(lt) : /^[-*+]\s+(.*)$/.exec(lt);
            if (!mm) break;
            items.push("<li>" + mdInline(mm[1]) + "</li>"); i++;
          }
          html += `<${tag}>${items.join("")}</${tag}>`;
          continue;
        }
        para.push(t); i++;
      }
      flush();
      return html.replace(/\u0002(\d+)\u0002/g, (m, n) => blocks[n]);
    }

    function fmtSize(n) {
      if (n < 1024) return n + " o";
      if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " Ko";
      return (n / (1024 * 1024)).toFixed(1) + " Mo";
    }
    function fmtDate(iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString("fr-FR", { dateStyle: "short", timeStyle: "short" }); }
      catch (e) { return ""; }
    }

    // ── Conversations ───────────────────────────────────────────────────────
    async function loadConversations(openFirst = true) {
      const list = await (await fetch("/conversations")).json();
      renderConvList(list);
      if (openFirst) {
        if (list.length === 0) { await newConversation(); }
        else if (!activeId || !list.some(c => c.id === activeId)) { await openConversation(list[0].id); }
      }
      return list;
    }

    function renderConvList(list) {
      $convList.innerHTML = "";
      for (const c of list) {
        const row = document.createElement("div");
        row.className = "conv" + (c.id === activeId ? " active" : "");
        const canDelete = list.length > 1;
        row.innerHTML =
          `<div class="meta"><div class="title">${escapeHtml(c.title)}</div>` +
          `<div class="date">${fmtDate(c.updated_at)} · ${c.message_count} msg · ${c.file_count} fich.</div></div>` +
          (canDelete ? `<button class="del" title="Supprimer">✕</button>` : "");
        row.querySelector(".meta").addEventListener("click", () => openConversation(c.id));
        if (canDelete) row.querySelector(".del").addEventListener("click", (e) => { e.stopPropagation(); deleteConversation(c.id); });
        $convList.appendChild(row);
      }
    }

    function renderFiles(files) {
      $fileList.innerHTML = "";
      if (!files || files.length === 0) {
        $fileList.innerHTML = '<div class="file-empty">Aucun fichier pour l\'instant.</div>';
        return;
      }
      for (const f of files) {
        const a = document.createElement("a");
        a.href = `/conversations/${activeId}/files/${encodeURIComponent(f.name)}`;
        a.title = "Télécharger " + f.name;
        a.setAttribute("download", "");
        a.innerHTML = `<span class="name">📄 ${escapeHtml(f.name)}</span><span class="sz">${fmtSize(f.size)}</span>`;
        $fileList.appendChild(a);
      }
    }

    function showWelcome() {
      $messages.innerHTML =
        `<div class="welcome">` +
        `<div class="welcome-logo" role="img" aria-label="IGN"></div>` +
        `<h2>Bienvenue 👋</h2>` +
        `<p>Demandez à l'agent de récupérer des données de la Géoplateforme IGN ` +
        `puis de les manipuler dans QGIS — en langage naturel.</p>` +
        `<div class="chips">` +
        `<button class="chip">Quelle est l'altitude au point lon 4.83 lat 45.76 ?</button>` +
        `<button class="chip">Géocode « 1 place Bellecour, Lyon » et localise-le dans QGIS</button>` +
        `<button class="chip">Liste les couches WFS contenant « bati »</button>` +
        `</div></div>`;
      $messages.querySelectorAll(".chip").forEach(b =>
        b.addEventListener("click", () => { $prompt.value = b.textContent; autoGrow(); send(); }));
    }

    async function openConversation(id) {
      const data = await (await fetch(`/conversations/${id}`)).json();
      activeId = id;
      $messages.innerHTML = "";
      if (data.messages.length === 0) showWelcome();
      else for (const m of data.messages) addMessage(m.role, m.content);
      renderFiles(data.files);
      // surligne l'actif sans recharger toute la liste
      document.querySelectorAll(".conv").forEach(el => el.classList.remove("active"));
      const list = await (await fetch("/conversations")).json();
      renderConvList(list);
      closeSidebar();   // referme le panneau coulissant sur petits écrans
      scrollDown();
      $prompt.focus();
    }

    async function newConversation() {
      const meta = await (await fetch("/conversations", { method: "POST" })).json();
      await loadConversations(false);
      await openConversation(meta.id);
    }

    async function deleteConversation(id) {
      if (!confirm("Supprimer cette conversation et ses fichiers ?")) return;
      await fetch(`/conversations/${id}`, { method: "DELETE" });
      if (id === activeId) {
        activeId = null;
        showWelcome();
        renderFiles([]);
      }
      const list = await (await fetch("/conversations")).json();
      renderConvList(list);
    }

    // ── Rendu des messages ──────────────────────────────────────────────────
    function addMessage(role, text) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + (role === "user" ? "user" : "bot");
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (role === "user") {
        bubble.textContent = text;          // les messages utilisateur restent en texte brut
      } else {
        bubble.classList.add("md");
        bubble.innerHTML = renderMarkdown(text);  // réponses de l'agent : markdown rendu
      }
      wrap.appendChild(bubble);
      $messages.appendChild(wrap);
      scrollDown();
      return bubble;
    }

    function makeBotTurn() {
      const wrap = document.createElement("div");
      wrap.className = "msg bot";
      const col = document.createElement("div");
      col.style.maxWidth = "78%";

      const steps = document.createElement("details");
      steps.className = "steps";
      steps.open = true;
      const sum = document.createElement("summary");
      sum.textContent = "Étapes de l'agent";
      steps.appendChild(sum);

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      // Indicateur de travail : spinner « planète » + verbe rotatif.
      const verb = document.createElement("span");
      verb.className = "verb";
      verb.textContent = pickVerb();
      const work = document.createElement("span");
      work.className = "working";
      work.innerHTML = '<span class="planet"><span class="orbit"></span><span class="core"></span></span>';
      work.appendChild(verb);
      bubble.appendChild(work);

      col.appendChild(steps);
      col.appendChild(bubble);
      wrap.appendChild(col);
      $messages.appendChild(wrap);
      scrollDown();

      const ui = { steps, bubble, col };
      ui.timer = setInterval(() => { verb.textContent = pickVerb(); }, 2500);
      return ui;
    }

    function stopWorking(ui) {
      if (ui && ui.timer) { clearInterval(ui.timer); ui.timer = null; }
    }

    function addStep(steps, html) {
      const div = document.createElement("div");
      div.className = "step";
      div.innerHTML = html;
      steps.appendChild(div);
      scrollDown();
    }

    function scrollDown() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function handleEvent(evt, ui) {
      if (evt.type === "tool_call") {
        addStep(ui.steps,
          `🛠️ <span class="tool">${escapeHtml(evt.name)}</span> ` +
          `<code>${escapeHtml(JSON.stringify(evt.args))}</code>`);
      } else if (evt.type === "tool_result") {
        addStep(ui.steps,
          `↳ <em>${escapeHtml(evt.name || "")}</em> : ` +
          `<span class="res">${escapeHtml(evt.preview || "")}</span>`);
      } else if (evt.type === "final") {
        stopWorking(ui);
        ui.bubble.classList.add("md");
        ui.bubble.innerHTML = renderMarkdown(evt.text);
        // Affiche le coût / tokens si disponible.
        if (evt.usage) {
          const u = evt.usage;
          const parts = [];
          if (u.input_tokens || u.output_tokens)
            parts.push(`${(u.input_tokens || 0).toLocaleString("fr-FR")} tokens IN · ${(u.output_tokens || 0).toLocaleString("fr-FR")} tokens OUT`);
          if (u.cost != null)
            parts.push(`<span class="cost-val">${u.cost < 0.01 ? u.cost.toFixed(4) : u.cost.toFixed(3)} $</span>`);
          if (parts.length) {
            const badge = document.createElement("div");
            badge.className = "cost-badge";
            badge.innerHTML = "💸 " + parts.join(" — ");
            ui.col.appendChild(badge);
          }
        }
        scrollDown();
      } else if (evt.type === "stopped") {
        stopWorking(ui);
        ui.bubble.textContent = "⏹ Travail de l'agent interrompu.";
      } else if (evt.type === "error") {
        stopWorking(ui);
        ui.bubble.textContent = "❌ " + evt.message;
      }
    }

    let working = false;
    let controller = null;

    function setWorking(on) {
      working = on;
      if (on) {
        $send.classList.add("stop");
        $send.textContent = "■";
        $send.title = "Arrêter le travail de l'agent";
      } else {
        $send.classList.remove("stop");
        $send.textContent = "Envoyer";
        $send.title = "";
      }
    }

    async function stopTurn() {
      try { await fetch("/stop", { method: "POST" }); } catch (e) { /* ignore */ }
      if (controller) controller.abort();
    }

    async function refreshAfterTurn() {
      // Met à jour les titres + fichiers (l'agent a pu en produire).
      try {
        renderConvList(await (await fetch("/conversations")).json());
        const data = await (await fetch(`/conversations/${activeId}`)).json();
        renderFiles(data.files);
      } catch (e) { /* ignore */ }
    }

    async function send() {
      const text = $prompt.value.trim();
      if (!text) return;
      // Crée automatiquement une conversation si aucune n'est active.
      if (!activeId) {
        const meta = await (await fetch("/conversations", { method: "POST" })).json();
        activeId = meta.id;
        const list = await (await fetch("/conversations")).json();
        renderConvList(list);
      }
      $prompt.value = "";
      autoGrow();

      const w = $messages.querySelector(".welcome");
      if (w) w.remove();
      addMessage("user", text);
      const ui = makeBotTurn();
      controller = new AbortController();
      setWorking(true);

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, conversation_id: activeId }),
          signal: controller.signal,
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf("\n")) >= 0) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (line) handleEvent(JSON.parse(line), ui);
          }
        }
      } catch (e) {
        stopWorking(ui);
        if (e.name === "AbortError") {
          ui.bubble.textContent = "⏹ Travail de l'agent interrompu.";
        } else {
          ui.bubble.textContent = "❌ Erreur réseau : " + e;
        }
      } finally {
        stopWorking(ui);
        setWorking(false);
        controller = null;
        await refreshAfterTurn();
        $prompt.focus();
      }
    }

    function autoGrow() {
      $prompt.style.height = "auto";
      $prompt.style.height = Math.min($prompt.scrollHeight, 160) + "px";
    }

    $send.addEventListener("click", () => { if (working) stopTurn(); else send(); });
    $newConv.addEventListener("click", newConversation);
    $prompt.addEventListener("input", autoGrow);
    $prompt.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!working) send(); }
    });

    loadConversations(true);
  </script>
</body>
</html>
